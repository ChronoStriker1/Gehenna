included:
  - .
excluded:
  - .build
  - build
  - DerivedData

opt_in_rules:
  - empty_count
  - explicit_init
  - explicit_self
  - fatal_error_message
  - force_unwrapping
  - implicit_return
  - multiline_parameters
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_imports
  - unused_import

line_length:
  warning: 120
  error: 160

function_body_length:
  warning: 80
  error: 120

type_body_length:
  warning: 300
  error: 450

file_length:
  warning: 500
  error: 800

reporter: "xcode"
